<!DOCTYPE html>
<!-- 이 파일은 웹페이지의 뼈대(구조)를 만드는 곳입니다.
     화면에 무엇을 보여줄지(제목, 검색창, Top5 목록, 추가 버튼 등)를 여기에 적습니다. -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyTop5 - 영화 & 드라마 추천</title>

    <!-- 디자인(색, 크기 등)을 정해 둔 CSS 파일을 불러옵니다. -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- 동작(목록 보여주기, 검색, 추가 등)을 적어 둔 JS 파일을 불러옵니다.
         defer: HTML을 다 읽은 뒤에 JS가 실행되도록 합니다. -->
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <!-- 여기에 화면을 만듭니다.
         예: 상단 제목 / 검색창 / Top5 목록 영역 / 사이드의 "추가하기" 버튼 -->
  </body>
</html>
